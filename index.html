<!doctype html>
<html lang="de" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#f5f6f8" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f1217" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="Privater, offline-first Fitness Tracker: eigener Wochenplan und tägliches Workout-Tracking." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Trainingsplan" />
    <title>Trainingsplan — Fitness Tracker</title>
    <script>
      // Theme früh setzen, um Flackern beim Laden zu vermeiden.
      try {
        var raw = localStorage.getItem('fitness-tracker-v1');
        var theme = raw ? JSON.parse(raw).theme : 'system';
        document.documentElement.dataset.theme = theme || 'system';
      } catch (e) {
        document.documentElement.dataset.theme = 'system';
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
